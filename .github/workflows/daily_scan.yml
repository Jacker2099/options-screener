name: Daily Options Scan

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests tqdm lxml

      - name: Run screener
        run: python options_screener.py --top 20 --workers 6

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: signals-${{ github.run_number }}
          path: signals_*.csv
          retention-days: 30

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p results
          cp signals_*.csv results/ 2>/dev/null || true
          git add results/
          git diff --staged --quiet || git commit -m "scan $(date +'%Y-%m-%d')"
          git push
