name: NVDA TSLA Post-Close Options Radar

on:
  schedule:
    # 00:15 UTC = 20:15 ET during US daylight time, for Mon-Fri US sessions
    - cron: "15 0 * * 2-6"
    # 01:15 UTC = 20:15 ET during US standard time, for Mon-Fri US sessions
    - cron: "15 1 * * 2-6"
    - cron: "30 12 * * 0"
  workflow_dispatch:

concurrency:
  group: nvda-tsla-options-radar
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONUNBUFFERED: "1"

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Run Radar
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          mkdir -p data/options_snapshots reports/daily reports/weekly
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            python options_screener.py --mode daily 2>&1 | tee reports/last_run.log
          else
            python options_screener.py --mode auto --enforce-postclose-window 2>&1 | tee reports/last_run.log
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nvda-tsla-options-radar-${{ github.run_number }}
          path: |
            data/options_snapshots/*
            reports/daily/*
            reports/weekly/*
            reports/last_run.log
          retention-days: 30
          if-no-files-found: warn

      - name: Commit Data
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/options_snapshots reports || true
          git diff --staged --quiet && exit 0
          git commit -m "options radar $(date -u +'%Y-%m-%d')"
          git pull --rebase origin "${{ github.ref_name }}" || true
          git push || echo "git push skipped, workflow continues"
