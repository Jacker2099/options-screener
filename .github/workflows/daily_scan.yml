name: NVDA TSLA Monthly Options Radar v4

on:
  schedule:
    # 美股收盘 16:00 ET + 4h = 20:00 ET
    # EDT (3月-11月): 20:00 ET = 00:00 UTC 次日
    # EST (11月-3月): 20:00 ET = 01:00 UTC 次日
    - cron: "0 0 * * 2-6"     # UTC 00:00 (EDT 20:00) 周二到周六
    - cron: "0 1 * * 2-6"     # UTC 01:00 (EST 20:00) 备份时段
  workflow_dispatch:

concurrency:
  group: options-radar-v4
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONUNBUFFERED: "1"

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install yfinance pandas requests databento longport

      - name: Run Radar
        id: radar
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABENTO_API_KEY: ${{ secrets.DATABENTO_API_KEY }}
          LONGPORT_APP_KEY: ${{ secrets.LONGPORT_APP_KEY }}
          LONGPORT_APP_SECRET: ${{ secrets.LONGPORT_APP_SECRET }}
          LONGPORT_ACCESS_TOKEN: ${{ secrets.LONGPORT_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p reports/daily data

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "手动触发"
            python options_screener.py --mode daily 2>&1 | tee reports/last_run.log
          else
            echo "定时触发, 启用盘后窗口检查和去重"
            python options_screener.py \
              --mode daily \
              --enforce-postclose-window \
              --skip-if-exists \
              2>&1 | tee reports/last_run.log
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: options-radar-${{ github.run_number }}
          path: |
            data/oi_history.db
            reports/daily/*
            reports/last_run.log
          retention-days: 30
          if-no-files-found: warn

      - name: Commit Data
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports data || true
          git diff --staged --quiet && echo "无变更, 跳过提交" && exit 0
          git commit -m "radar $(date -u +'%Y-%m-%d %H:%M')"
          for i in 1 2 3; do
            git pull --rebase origin "${{ github.ref_name }}" && git push && break
            echo "推送重试 $i..."
            sleep 5
          done
