name: Daily Options Scan

on:
  schedule:
    # GitHub Actions cron is UTC.
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-options-scan
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests tqdm lxml

      - name: Run screener
        id: run_screener
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p results scripts/.state
          OUTPUT_FILE="results/signals_$(date -u +'%Y%m%d_%H%M').csv"
          echo "output_file=${OUTPUT_FILE}" >> "$GITHUB_OUTPUT"
          if [ -f "options_screener.py" ]; then
            python options_screener.py --top 20 --workers 6 --output "${OUTPUT_FILE}"
          else
            python scripts/options_screener.py --top 20 --workers 6 --output "${OUTPUT_FILE}"
          fi

      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signals-${{ github.run_number }}
          path: |
            results/signals_*.csv
            scripts/.state/*.json
          retention-days: 30
          if-no-files-found: warn

      - name: Commit results and state
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/*.csv scripts/.state/*.json || true
          git diff --staged --quiet || git commit -m "scan $(date -u +'%Y-%m-%d')"
          git push
